<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>고등학교 지도 — 지역별 학교 찾기</title>

  <!-- 한국어 웹폰트 Pretendard -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

  <!-- 지도 라이브러리 Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <!-- 상단 헤더 -->
    <header class="header">
      <button id="sidebar-toggle" class="sidebar-toggle" aria-label="지역 목록 열기">☰ 지역</button>

      <div class="brand">
        <span class="brand-mark">고등학교 지도</span>
        <span class="brand-sub">지역으로 찾고, 한눈에 보기</span>
      </div>

      <div class="search">
        <input id="search-input" type="text" placeholder="학교 이름으로 검색…"
               autocomplete="off" aria-label="학교 검색" />
        <ul id="search-results" class="search-results"></ul>
      </div>
    </header>

    <!-- 본문: 왼쪽 지역 목록 + 지도 -->
    <div class="main">
      <aside id="sidebar" class="sidebar">
        <p class="sidebar-title">지역</p>
        <ul id="region-list" class="region-list"></ul>
      </aside>

      <div id="map"></div>

      <!-- 학교를 클릭하면 나타나는 설명창 -->
      <section id="info-panel" class="info-panel" aria-live="polite"></section>
    </div>
  </div>

  <!-- 스크립트 -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
